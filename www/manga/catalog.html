<!doctype html>
<html lang="es">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Catálogo - Todo sobre mangas</title>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}
			body {
				font-family: Arial, sans-serif;
				line-height: 1.6;
				color: #333;
			}
			header {
				background: #2c3e50;
				color: #fff;
				padding: 1rem;
			}
			nav {
				background: #34495e;
				padding: 0.5rem 1rem;
			}
			nav a {
				color: #fff;
				text-decoration: none;
				margin-right: 1.5rem;
			}
			nav a:hover {
				text-decoration: underline;
			}
			main {
				padding: 2rem;
				max-width: 1200px;
				margin: 0 auto;
			}
			h1 {
				color: #2c3e50;
				margin-bottom: 1rem;
			}
			h2 {
				color: #2c3e50;
				margin: 1.5rem 0 1rem;
			}
			.catalog {
				display: grid;
				grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
				gap: 2rem;
			}
			.product {
				border: 1px solid #ddd;
				border-radius: 8px;
				padding: 1rem;
				text-align: center;
			}
			.product img {
				width: 150px;
				height: 220px;
				object-fit: cover;
				border-radius: 4px;
			}
			.product h3 {
				margin: 1rem 0 0.5rem;
				color: #2c3e50;
			}
			.product .price {
				color: #e74c3c;
				font-weight: bold;
				font-size: 1.2rem;
			}
			footer {
				background: #2c3e50;
				color: #fff;
				text-align: center;
				padding: 1rem;
				margin-top: 2rem;
			}
		</style>
	</head>
	<body>
		<header>
			<h1>Todo sobre mangas</h1>
		</header>
		<nav>
			<a href="/manga/index.html">Home</a>
			<a href="/manga/catalog.html">Catalog</a>
			<a href="/manga/about.html">About</a>
		</nav>
		<main>
			<h2>Nuestro Catálogo</h2>
			<section class="catalog">
				<article class="product">
					<img src="/manga/images/manga1.jpg" alt="One Piece" />
					<h3>One Piece</h3>
					<p class="price">$12.99</p>
				</article>
				<article class="product">
					<img src="/manga/images/manga2.jpg" alt="Naruto" />
					<h3>Naruto</h3>
					<p class="price">$10.99</p>
				</article>
				<article class="product">
					<img src="/manga/images/manga3.jpg" alt="Attack on Titan" />
					<h3>Attack on Titan</h3>
					<p class="price">$14.99</p>
				</article>
				<article class="product">
					<img src="/manga/images/manga4.jpg" alt="Death Note" />
					<h3>Death Note</h3>
					<p class="price">$11.99</p>
				</article>
			</section>
		</main>
		<footer>
			<p>&copy; 2026 Todo sobre mangas. Todos los derechos reservados.</p>
		</footer>
	</body>
</html>
